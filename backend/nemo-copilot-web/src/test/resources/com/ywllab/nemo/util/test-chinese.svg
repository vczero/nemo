<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="500" height="400" fill="url(#grad1)" rx="20"/>
  
  <text x="250" y="100" font-family="sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">SVG转PDF测试</text>
  <text x="250" y="140" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">基于Apache PDFBox 3.0.6</text>
  <text x="250" y="180" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">支持阿里巴巴普惠体3.0字体</text>
  
  <rect x="100" y="220" width="300" height="100" fill="rgba(255,255,255,0.9)" rx="10"/>
  <text x="250" y="260" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">功能特性：</text>
  <text x="250" y="285" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">• 高质量PDF输出</text>
  <text x="250" y="305" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">• 支持中文字体</text>
  
  <circle cx="50" cy="50" r="30" fill="rgba(255,255,255,0.3)"/>
  <circle cx="450" cy="350" r="40" fill="rgba(255,255,255,0.3)"/>
