version: '2.2'
services:
  nemo-copilot-web-{{profile}}:
    image: adoptopenjdk/openjdk8:jre8u282-b08
    container_name: nemo-copilot-{{profile}}
    hostname: nemo-copilot-{{inventory_hostname}}-{{profile}}
    restart: always
    ports:
      - '{{server_port}}:8770'
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=http://172.27.196.250:3128
      - HTTPS_PROXY=http://172.27.196.250:3128
      - NO_PROXY=localhost,127.0.0.1,10.,172.,192.168.
    volumes:
      - "/opt/nemo-copilot/{{profile}}/dist/nemo-copilot-web.jar:/opt/nemo-copilot/nemo-copilot-web.jar"
      - "/etc/localtime:/etc/localtime"
      - "/opt/nemo-copilot-web/logs:/usr/local/tomcat/logs"
{% if otel_enabled | default(false) %}
      - "/usr/share/opentelemetry/opentelemetry-javaagent.jar:/usr/share/opentelemetry/opentelemetry-javaagent.jar:ro"
{% endif %}
{% if otel_enabled | default(false) %}
    entrypoint: >
      java -Dotel.exporter.otlp.endpoint={{ otel_exporter_otlp_endpoint }}
      -Dotel.exporter.otlp.headers={{ otel_exporter_otlp_headers }}
      -Dotel.exporter.otlp.protocol={{ otel_exporter_otlp_protocol }}
      -Dotel.service.name={{ otel_service_name }}-{{profile}}
      -Dotel.resource.attributes={{ otel_resource_attributes }}
      -javaagent:/usr/share/opentelemetry/opentelemetry-javaagent.jar
      -jar /opt/nemo-copilot/nemo-copilot-web.jar
      --spring.profiles.active={{profile}}
{% else %}
    entrypoint: java -jar /opt/nemo-copilot/nemo-copilot-web.jar --spring.profiles.active={{profile}}
{% endif %}
