[defaults]
local_tmp = /tmp/ansible
retry_files_enabled = False
roles_path = roles

callback_whitelist=profile_tasks
display_args_to_stdout=True
command_warnings=False
stdout_callback=default

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null  -o KexAlgorithms=curve25519-sha256,ecdh-sha2-nistp521
